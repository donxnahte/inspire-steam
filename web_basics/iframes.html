<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module04: iframes</title>
</head>
<body>
    <!--
    Embed another website's content within yo website
    Attributes:
    src - link to the resource online
    width, height - size of window (pixels) 
    title - people with screen readers
    allow full screen
    -->
   <iframe width="560" height="315" src="https://www.youtube.com/embed/lSSkQnHWisM?si=rv185dNEJNIRnRjL" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
