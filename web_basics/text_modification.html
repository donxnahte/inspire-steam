<html>
    <head>
        <title>Module01: h1, h2, p, em, div</title>
    </head>
    <body>
        <h1>music band </h1>
        <hr>
        <h2>about</h2>
        <div>
            <!--em (emphasis) b (bold)-->
            <p>Rediscovering music, <em>1 album at a time</em></p>
            <!--small (small text) and i (italic)-->
            <p><small><i>don</i></small></p>
            <hr>
        </div>
        <div>
            <!--sub (subscript), sup (superscript), li-->
            <h3>discover</h3>
            <li>S<sub>c</sub></li>
            <li>C<sub>s</sub></li>
            <h4>bars</h4>
        </div>
    </body>
</html>
